name: Deploy Backend to AWS EC2

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "deploy/aws/**.md"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Verify deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=0
          if [ -z "${EC2_HOST}" ]; then
            echo "::error::Repository secret EC2_HOST is empty or not set. Add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ -z "${EC2_SSH_KEY}" ]; then
            echo "::error::Repository secret EC2_SSH_KEY is empty or not set. Paste the full private key PEM (including BEGIN/END lines)."
            missing=1
          fi
          exit "${missing}"

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          BRANCH="${DEPLOY_BRANCH:-main}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=300 ubuntu@"${EC2_HOST}" "bash -s" <<EOF
          set -euo pipefail
          echo "=== Pulling latest code ==="
          cd /home/ubuntu/backend
          git fetch --all
          git reset --hard origin/${BRANCH}

          echo "=== Installing Python dependencies ==="
          source venv/bin/activate
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

          echo "=== Reinstalling systemd unit files (in case they changed) ==="
          sudo install -m 0644 deploy/aws/systemd/libraryconnekto-api.service    /etc/systemd/system/libraryconnekto-api.service
          sudo install -m 0644 deploy/aws/systemd/libraryconnekto-celery.service /etc/systemd/system/libraryconnekto-celery.service
          sudo install -m 0644 deploy/aws/systemd/libraryconnekto-beat.service   /etc/systemd/system/libraryconnekto-beat.service
          sudo install -m 0644 deploy/aws/nginx/libraryconnekto.conf            /etc/nginx/sites-available/libraryconnekto
          sudo systemctl daemon-reload
          sudo nginx -t

          echo "=== Running database migrations ==="
          alembic upgrade head

          echo "=== Restarting services ==="
          sudo systemctl restart libraryconnekto-api
          sudo systemctl restart libraryconnekto-celery
          sudo systemctl restart libraryconnekto-beat
          sudo systemctl reload nginx

          echo "=== Health check ==="
          sleep 5
          curl --fail --silent --show-error http://127.0.0.1:8000/health
          echo
          echo "=== Deploy complete ==="
          EOF

      - name: Notify on failure
        if: failure()
        run: echo "::error::Backend deployment failed - check the SSH job logs above."

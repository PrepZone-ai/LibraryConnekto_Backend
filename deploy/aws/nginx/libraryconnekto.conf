# /etc/nginx/sites-available/libraryconnekto
# Reverse proxy for FastAPI backend on EC2.
# Reference: AWS_Deploy.md, Section 9
#
# After putting this file in place:
#   sudo ln -sf /etc/nginx/sites-available/libraryconnekto /etc/nginx/sites-enabled/libraryconnekto
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Then obtain SSL with:
#   sudo certbot --nginx -d api.libraryconnekto.me \
#        --non-interactive --agree-tos --email you@example.com --redirect

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name api.libraryconnekto.me;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 15M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    location /uploads/ {
        alias /home/ubuntu/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}

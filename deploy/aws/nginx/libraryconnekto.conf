# /etc/nginx/sites-available/libraryconnekto
# Reverse proxy for FastAPI backend on EC2.
# Reference: AWS_Deploy.md, Section 9
#
# CORS is applied here (in addition to FastAPI) so browsers still see
# Access-Control-Allow-* on upstream errors (500/502) and plain-text bodies.
# Add every frontend origin users hit (apex + www, http for local if needed).
#
# After putting this file in place:
#   sudo ln -sf /etc/nginx/sites-available/libraryconnekto /etc/nginx/sites-enabled/libraryconnekto
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Then obtain/renew SSL certs with:
#   sudo certbot certonly --nginx -d api.libraryconnekto.me \
#        --non-interactive --agree-tos --email you@example.com
#
# This file already contains both 80 and 443 server blocks so deploys do not
# depend on certbot modifying nginx conf on each run.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Whitelist: must match browser Origin exactly (scheme + host, no trailing slash).
map $http_origin $cors_origin {
    default "";
    "https://libraryconnekto.me"           $http_origin;
    "https://www.libraryconnekto.me"       $http_origin;
    "http://localhost:5173"                $http_origin;
    "http://127.0.0.1:5173"                $http_origin;
}

server {
    listen 80;
    server_name api.libraryconnekto.me;

    # Allow ACME challenge over HTTP when certbot validates domain ownership.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Enforce HTTPS for all API traffic.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.libraryconnekto.me;

    ssl_certificate /etc/letsencrypt/live/api.libraryconnekto.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.libraryconnekto.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 15M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /uploads/ {
        alias /home/ubuntu/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Optional: allow cross-origin images if the app reads them from JS/canvas
        add_header Access-Control-Allow-Origin $cors_origin always;
    }

    location /health {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "Content-Disposition" always;
    }

    location / {
        limit_req zone=api_limit burst=50 nodelay;

        # Strip upstream CORS for these so nginx sets one consistent value (incl. on 5xx).
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffering off;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "Content-Disposition" always;
    }
}
